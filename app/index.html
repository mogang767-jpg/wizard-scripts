<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0F0F12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Wizard Scripts — Готовые скрипты для Telegram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      // SPA redirect handler for GitHub Pages
      (function() {
        const q = window.location.search;
        if (q && q[0] === '?' && q[1] === '/') {
          const cleaned = q.slice(2).replace(/~and~/g, '&');
          window.history.replaceState(null, null, '/' + cleaned + window.location.hash);
        }
      })();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
